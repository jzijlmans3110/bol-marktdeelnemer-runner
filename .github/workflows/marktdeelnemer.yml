name: bol-marktdeelnemer

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Parallel workers per shard'
        default: '25'
        type: string
      shards:
        description: 'Aantal shards'
        default: '16'
        type: string
      backoff:
        description: '429 backoff seconds'
        default: '5'
        type: string

jobs:
  s0:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ fromJSON(inputs.shards) >= 1 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: curl -s ifconfig.me; echo
      - run: python runner.py
        env:
          BOL_NAME: s0
          BOL_SHARD: 0/${{ inputs.shards }}
          BOL_WORKERS: ${{ inputs.workers }}
          BOL_429_BACKOFF: ${{ inputs.backoff }}
          BOL_CLIENT_ID: ${{ secrets.JORDY1_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.JORDY1_CLIENT_SECRET }}

