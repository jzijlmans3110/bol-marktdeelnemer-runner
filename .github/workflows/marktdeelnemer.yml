name: bol-marktdeelnemer

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Parallel workers per shard'
        default: '20'
        type: string
      shards:
        description: 'Aantal shards (2, 3 of 4)'
        default: '3'
        type: string

jobs:
  shard-0:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: curl -s ifconfig.me; echo
      - run: python runner.py
        env:
          BOL_NAME: shard-0
          BOL_SHARD: 0/${{ inputs.shards }}
          BOL_WORKERS: ${{ inputs.workers }}
          BOL_CLIENT_ID: ${{ secrets.JORDY2_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.JORDY2_CLIENT_SECRET }}

  shard-1:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: curl -s ifconfig.me; echo
      - run: python runner.py
        env:
          BOL_NAME: shard-1
          BOL_SHARD: 1/${{ inputs.shards }}
          BOL_WORKERS: ${{ inputs.workers }}
          BOL_CLIENT_ID: ${{ secrets.JORDY3_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.JORDY3_CLIENT_SECRET }}

  shard-2:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ inputs.shards != '2' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: curl -s ifconfig.me; echo
      - run: python runner.py
        env:
          BOL_NAME: shard-2
          BOL_SHARD: 2/${{ inputs.shards }}
          BOL_WORKERS: ${{ inputs.workers }}
          BOL_CLIENT_ID: ${{ secrets.JORDY4_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.JORDY4_CLIENT_SECRET }}

  shard-3:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ inputs.shards == '4' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: curl -s ifconfig.me; echo
      - run: python runner.py
        env:
          BOL_NAME: shard-3
          BOL_SHARD: 3/4
          BOL_WORKERS: ${{ inputs.workers }}
          BOL_CLIENT_ID: ${{ secrets.JORDY2_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.JORDY2_CLIENT_SECRET }}
