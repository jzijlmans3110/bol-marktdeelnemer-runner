name: bol-marktdeelnemer

# Matrix-versie (2026-06-12): shard-aantal is nu 1 getal i.p.v. 16 hardcoded job-blokken.
# marktdeelnemer-PUT schaalt per-IP => meer shards (= meer runners = meer IP's) = sneller.
# 16 Bol-clients (JORDY1..JORDY16) worden via modulo over de shards gerouleerd.
# Origineel met 16 vaste blokken bewaard als marktdeelnemer.yml.bak16.

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Parallel workers per shard'
        default: '25'
        type: string
      shards:
        description: 'Aantal shards (= aantal IP-runners, tot ~480 op Enterprise)'
        default: '16'
        type: string
      maxparallel:
        description: 'Max gelijktijdige shards (houd marge < 500 voor Arlon-recycle)'
        default: '64'
        type: string
      clients:
        description: 'Aantal beschikbare Bol-clients om over te rouleren (JORDY1..N)'
        default: '16'
        type: string
      backoff:
        description: '429 backoff seconds'
        default: '5'
        type: string

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Build shard matrix
        id: gen
        env:
          N: ${{ inputs.shards }}
          NUM_CLIENTS: ${{ inputs.clients }}
        run: |
          python - <<'EOF'
          import json, os
          n = int(os.environ["N"])
          nc = int(os.environ["NUM_CLIENTS"])
          inc = [{"shard": i, "client": "JORDY%d" % (i % nc + 1)} for i in range(n)]
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("matrix=" + json.dumps(inc) + "\n")
          print(f"shards={n} clients={nc} -> {len(inc)} matrix entries")
          EOF

  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Pull Bol CSV export
        env:
          BOL_NAME: fetch
          BOL_FETCH_ONLY: '1'
          BOL_CLIENT_ID: ${{ secrets.JORDY1_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.JORDY1_CLIENT_SECRET }}
        run: python runner.py
      - uses: actions/upload-artifact@v4
        with:
          name: bol-csv
          path: ./bol_export.csv
          retention-days: 1

  apply:
    needs: [prep, fetch]
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.maxparallel) }}
      matrix:
        include: ${{ fromJSON(needs.prep.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: bol-csv
      - run: curl -s ifconfig.me; echo
      - run: python runner.py
        env:
          BOL_NAME: s${{ matrix.shard }}
          BOL_SHARD: ${{ matrix.shard }}/${{ inputs.shards }}
          BOL_WORKERS: ${{ inputs.workers }}
          BOL_429_BACKOFF: ${{ inputs.backoff }}
          BOL_USE_CACHE: '1'
          BOL_CLIENT_ID: ${{ secrets[format('{0}_CLIENT_ID', matrix.client)] }}
          BOL_CLIENT_SECRET: ${{ secrets[format('{0}_CLIENT_SECRET', matrix.client)] }}
