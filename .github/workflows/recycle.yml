name: bol-recycle-jordy
on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'workers per shard'
        default: '8'
        type: string
      shards:
        description: 'aantal shards'
        default: '16'
        type: string

jobs:
  s0:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ fromJSON(inputs.shards) >= 1 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: curl -s -o datamodel_v10_nl.json https://productdatamodel.s-bol.com/v10/datamodel_v10_nl.json
      - run: python recycle_runner.py
        env:
          BOL_NAME: s0
          BOL_SHARD: 0/${{ inputs.shards }}
          BOL_WORKERS: ${{ inputs.workers }}
          BOL_USE_CACHE: '1'
          BOL_CACHE_PATH: recycle_list_jordy.csv
          BOL_CLIENT_ID: ${{ secrets.JORDY1_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.JORDY1_CLIENT_SECRET }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: recycle-done-s0
          path: recycle_done_s0.csv
          retention-days: 5
