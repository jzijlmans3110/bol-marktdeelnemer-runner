name: bol-marktdeelnemer-thijs

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Parallel workers per shard'
        default: '25'
        type: string
      shards:
        description: 'Aantal shards'
        default: '16'
        type: string
      backoff:
        description: '429 backoff seconds'
        default: '5'
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Pull Bol CSV export
        env:
          BOL_NAME: fetch
          BOL_FETCH_ONLY: '1'
          BOL_CLIENT_ID: ${{ secrets.THIJS1_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.THIJS1_CLIENT_SECRET }}
        run: python runner.py
      - uses: actions/upload-artifact@v4
        with:
          name: bol-csv
          path: ./bol_export.csv
          retention-days: 1

  s0:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: fetch
    if: ${{ fromJSON(inputs.shards) >= 1 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: bol-csv
      - run: curl -s ifconfig.me; echo
      - run: python runner.py
        env:
          BOL_NAME: s0
          BOL_SHARD: 0/${{ inputs.shards }}
          BOL_WORKERS: ${{ inputs.workers }}
          BOL_429_BACKOFF: ${{ inputs.backoff }}
          BOL_USE_CACHE: '1'
          BOL_CLIENT_ID: ${{ secrets.THIJS1_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.THIJS1_CLIENT_SECRET }}

